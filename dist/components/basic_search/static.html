        </div>
        <div class="qld__banner__search col-xs-12 col-md-12 col-lg-8">
          <div class="qld__search-form--wrapper">
            <form
              id="search-form-global-basic"
              class="qld__search-form"
              role="search"
              aria-label="sitewide"
              action="https://qhscb.squiz.cloud/wog-design-system/search"
            >
              <div class="qld__search-form__inner">
                <svg
                  class="qld__icon qld__icon--sm qld__search-form__inner-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <use
                    href="/mysource_files/img/QLD-icons.svg#search"
                  ></use>
                </svg>
                <input
                  id="search-input-global-basic-query"
                  class="qld__text-input data-hj-allow"
                  type="search"
                  name="query"
                  aria-expanded="false"
                  autocomplete="off"
                  disabled="true"
                  value=""
                />
                <input
                  id="name"
                  class="qld__text-input--validation"
                  type="text"
                  name="name"
                  autocomplete="off"
                  tabindex="-1"
                />
                <div class="qld__search-form__btn">
                  <button
                    class="qld__btn qld__btn--search"
                    type="button"
                    aria-label="Search"
                    disabled="true"
                  >
                    <span class="qld__btn__icon">
                      <svg
                        class="qld__icon"
                        xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true"
                      >
                        <use
                          href="/mysource_files/img/QLD-icons.svg#search"
                        ></use>
                      </svg>
                    </span>
                    <span class="qld__btn__text">Search</span>
                  </button>
                </div>
              </div>
            </form>

<section id="content" class="qld__body qld__search">
  <div class="container-fluid">
    <div class="row">
      <div class="col-xs-12 col-md-12">
        <div class="qld__search__info">
          <div class="qld__search__info-query">
            <h2 class="qld__display-lg">
              Results
                  for
                  <span class="qld__search__info-query-term">''</span>
            </h2>
          </div>
          <div class="qld__search__info-inner">
            <div class="qld__search__info-summary">
              <span class="qld__search__info-summary-text">Showing:</span>
              <span class="qld__search__info-summary-start-end"> -  of</span>
              <span class="qld__search__info-summary-matching"> results</span>
            </div>

            <div class="qld__search__sort">
              <label class="qld__search__sort-text" for="search-sort">
                Sort by:
              </label>
              <select id="search-sort" class="qld__select-control" name="sort">
                <option value="" selected="">Relevance</option>
                <option value="metafileName">A-Z</option>
                <option value="dmetafileName">Z-A</option>
                <option value="date">Newest</option>
                <option value="adate">Oldest</option>
              </select>
            </div>
          </div>
        </div>
        <div class="qld__search__results">
        </div>


      </div>
    </div>
  </div>
</section>
