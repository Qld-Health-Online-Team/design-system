name: Lint

on:
  workflow_dispatch:
  push:
    branches: [master, "release-**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  # eslint and stylelint jobs will be added here once their existing issues are
  # resolved. Mirror the `prettier` job above and swap the final step for
  # `npm run lint:js` / `npm run lint:styles` respectively.
